<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Provisioning</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            width: 100%; max-width: 400px;
            padding: 32px; border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .header { text-align: center; margin-bottom: 28px; }
        .logo-icon { 
            width: 56px; 
            height: 56px; 
            color: var(--primary); 
            margin-bottom: 16px;
            /* Smooth pulsating intro animation when portal loads */
            animation: pulse 3s infinite ease-in-out; 
        }

        @keyframes pulse {
            0% { opacity: 0.7; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(0.98); }
        }
        .header h2 { font-size: 24px; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
        .header p { font-size: 14px; color: var(--text-muted); }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { 
            display: block; font-size: 13px; font-weight: 600; 
            margin-bottom: 6px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px;
        }
        input {
            width: 100%; padding: 12px 16px; font-size: 15px;
            border: 1.5px solid var(--border); border-radius: 8px;
            outline: none; transition: all 0.2s ease; background: #f8fafc;
        }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15); }
        .btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
            color: #fff; background-color: var(--primary);
            border: none; border-radius: 8px; cursor: pointer;
            transition: background-color 0.2s; margin-top: 10px;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- SVG Vector Router Icon (0 KB network overhead) -->
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://w3.org">
            <circle cx="12" cy="18" r="2"/>
            <path d="M17.66 12.34a8 8 0 0 0-11.32 0M20.49 9.51a12 12 0 0 0-16.98 0M14.83 15.17a4 4 0 0 0-5.66 0" 
             stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
        </svg>
        <h2>Connect Solar Panel to WiFi</h2>
        <p>Configure the local network credentials</p>
    </div>

    <form action="/save" method="get">
        <div class="form-group">
            <label for="ssid">Network Name</label>
            <input type="text" id="ssid" name="ssid" placeholder="Enter Wi-Fi SSID" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter network password">
        </div>
        <button type="submit" class="btn">Configure Device</button>
    </form>

    <div class="footer">
        Hardware ID: ESP32-WROOM-32U
    </div>
    <div class="footer">
        Credits to Solaris!
    </div>
</div>

</body>
</html>
